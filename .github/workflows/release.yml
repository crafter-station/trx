name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/package.json"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Detect version change
        id: version
        run: |
          LOCAL=$(jq -r .version package.json)
          PUBLISHED=$(npm view @crafter/trx version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PUBLISHED -> $LOCAL"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($LOCAL), skipping publish"
          fi

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Seed trx config
        if: steps.version.outputs.changed == 'true'
        run: |
          mkdir -p ~/.trx/models
          cat > ~/.trx/config.json <<'EOF'
          {
            "backend": "local",
            "modelPath": "~/.trx/models/ggml-small.bin",
            "modelSize": "small",
            "language": "auto",
            "threads": 4,
            "wordTimestamps": false,
            "openai": { "model": "gpt-4o-transcribe" },
            "whisperFlags": {
              "suppressNst": true,
              "noFallback": true,
              "entropyThold": 2.8,
              "logprobThold": -1.0,
              "maxContext": 0
            }
          }
          EOF

      - name: Test
        if: steps.version.outputs.changed == 'true'
        env:
          TRX_SKIP_REAL: "1"
        run: bun test

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public

      - name: Tag and GitHub Release
        if: steps.version.outputs.changed == 'true'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.local }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"
          NOTES_FILE="packages/website/src/content/changelog/$VERSION.md"
          if [ -f "$NOTES_FILE" ]; then
            sed '1{/^---$/!q;};1,/^---$/d' "$NOTES_FILE" > /tmp/notes.md
            gh release create "v$VERSION" --title "v$VERSION" --notes-file /tmp/notes.md
          else
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes
          fi
